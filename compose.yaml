services:
  app:
    build:
      context: .
    ports:
      - "8080:8080"
    environment:
      # Override with a real, random secret in any non-local environment, e.g.:
      #   JWT_SECRET=$(openssl rand -base64 48) docker compose up
      - JWT_SECRET=${JWT_SECRET:-change-this-secret-in-production-please-make-it-long-and-random}
    volumes:
      - h2-data:/app/data

volumes:
  h2-data:
